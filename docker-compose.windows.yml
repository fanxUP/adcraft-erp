# Windows 部署覆盖配置
# 使用: docker compose -f docker-compose.yml -f docker-compose.windows.yml up -d
services:
  postgres:
    volumes:
      - adcraft_data_postgres:/var/lib/postgresql/data

  redis:
    volumes:
      - adcraft_data_redis:/data

  minio:
    volumes:
      - adcraft_data_minio:/data

  backup:
    volumes:
      - ./backups:/backups
      - ./uploads:/uploads
      - ./scripts:/scripts

volumes:
  adcraft_data_postgres:
  adcraft_data_redis:
  adcraft_data_minio:
