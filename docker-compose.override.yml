# Override volume mounts to use local paths instead of iCloud
# iCloud Drive can evict/ corrupt database files
services:
  postgres:
    volumes:
      - /Users/estefan-macworkstation/.adcraft-data/postgres:/var/lib/postgresql/data

  redis:
    volumes:
      - /Users/estefan-macworkstation/.adcraft-data/redis:/data

  minio:
    volumes:
      - /Users/estefan-macworkstation/.adcraft-data/minio:/data
