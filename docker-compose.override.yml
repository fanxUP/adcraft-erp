# Override volume mounts to use local paths instead of iCloud
# iCloud Drive can evict/ corrupt database files
services:
  postgres:
    volumes:
      - adcraft_data_postgres:/var/lib/postgresql/data

  redis:
    volumes:
      - adcraft_data_redis:/data

  minio:
    volumes:
      - adcraft_data_minio:/data
      
volumes:
  adcraft_data_postgres:
  adcraft_data_redis:
  adcraft_data_minio:
