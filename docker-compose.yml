version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: adcraft_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/var/www/uploads
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - adcraft-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adcraft_frontend
    restart: unless-stopped
    networks:
      - adcraft-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adcraft_backend
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - adcraft-net

  postgres:
    image: postgres:16-alpine
    container_name: adcraft_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adcraft_erp}
      POSTGRES_USER: ${POSTGRES_USER:-adcraft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adcraft_password}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - adcraft-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adcraft} -d ${POSTGRES_DB:-adcraft_erp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adcraft_redis
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - adcraft-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: adcraft_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_please}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - adcraft-net

  backup:
    image: alpine:latest
    container_name: adcraft_backup
    volumes:
      - ./backups:/backups
      - ./uploads:/uploads
      - ./data/postgres:/postgres_data:ro
    command: ["sh", "-c", "while true; do sleep 86400; done"]
    restart: unless-stopped
    networks:
      - adcraft-net

networks:
  adcraft-net:
    driver: bridge
