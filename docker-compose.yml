services:
  nginx:
    image: nginx:1.27-alpine
    container_name: adcraft_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/var/www/uploads
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - adcraft-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adcraft_frontend
    restart: unless-stopped
    networks:
      - adcraft-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adcraft_backend
    env_file:
      - .env
    environment:
      # Override localhost URLs with Docker service names
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-adcraft}:${POSTGRES_PASSWORD:-adcraft_password}@postgres:5432/${POSTGRES_DB:-adcraft_erp}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-adcraft}:${POSTGRES_PASSWORD:-adcraft_password}@postgres:5432/${POSTGRES_DB:-adcraft_erp}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - adcraft-net

  postgres:
    image: postgres:16-alpine
    container_name: adcraft_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adcraft_erp}
      POSTGRES_USER: ${POSTGRES_USER:-adcraft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - adcraft-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adcraft} -d ${POSTGRES_DB:-adcraft_erp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adcraft_redis
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - adcraft-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: adcraft_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_please}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - adcraft-net

  backup:
    image: alpine:3.21
    container_name: adcraft_backup
    volumes:
      - ./backups:/backups
      - ./uploads:/uploads
      - ./scripts:/scripts
    environment:
      PGHOST: postgres
      PGPORT: '5432'
      POSTGRES_DB: ${POSTGRES_DB:-adcraft_erp}
      POSTGRES_USER: ${POSTGRES_USER:-adcraft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    command: >
      sh -c "
        apk add --no-cache postgresql-client >/dev/null 2>&1 &&
        echo '0 2 * * * cd / && sh /scripts/backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
        echo 'Backup scheduler started — backups run daily at 2:00 AM' &&
        crond -b -l 2 &&
        while true; do sleep 3600; done
      "
    restart: unless-stopped
    networks:
      - adcraft-net

networks:
  adcraft-net:
    driver: bridge
